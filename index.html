<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sell4Life | Buy &amp; Sell Online</title>
    <meta name="description" content="Sell4Life — an online marketplace to buy and sell products across all categories. Shop electronics, fashion, books, toys and more from independent sellers." />
    <meta property="og:title" content="Sell4Life | Buy &amp; Sell Online" />
    <meta property="og:description" content="Discover thousands of products from independent sellers. Join Sell4Life to start buying or selling today." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/style.css" />
    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/quick-add.css" />
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>
  <body class="s4l-loading">

    <!-- Hero -->
    <section class="hero">
      <img src="/assets/images/hero/dolar-tag.png" alt="Sell4Life" />
      <h1>sell4life</h1>
      <h2>Sell smarter. Buy better.</h2>
      <p>An innovative marketplace for buying and selling with ease.</p>
      <div class="hero-ctas">
        <a href="/shop/" class="btn-cta btn-shop">Shop Now →</a>
        <a class="btn-cta btn-sell vendor-btn" data-vendor-start>Start Selling →</a>
      </div>
    </section>

    <!-- Trust strip -->
    <div class="trust-strip">
      <div class="trust-item">
        <span class="trust-num" id="stat-products">—</span>
        <span class="trust-label">Products</span>
      </div>
      <div class="trust-divider"></div>
      <div class="trust-item">
        <span class="trust-num" id="stat-sellers">—</span>
        <span class="trust-label">Sellers</span>
      </div>
      <div class="trust-divider"></div>
      <div class="trust-item">
        <span class="trust-num">Free</span>
        <span class="trust-label">To Browse</span>
      </div>
    </div>

    <!-- Promo Banner -->
    <section class="promo-slider" id="promo-slider" aria-label="Promotions">
      <div class="promo-track" id="promo-track"></div>
      <button type="button" class="promo-arrow promo-prev" id="promo-prev" aria-label="Previous">&#8249;</button>
      <button type="button" class="promo-arrow promo-next" id="promo-next" aria-label="Next">&#8250;</button>
      <div class="promo-dots" id="promo-dots"></div>
    </section>

    <!-- Featured Products -->
    <section class="featured-products">
      <div class="featured-header">
        <h2>Featured Products</h2>
        <a href="/shop/" class="featured-view-all">See all →</a>
      </div>
      <div class="featured-products-grid"></div>
      <div class="featured-footer">
        <a href="/shop/" class="featured-shop-btn">Browse All Products →</a>
      </div>
    </section>

    <!-- Category icons -->
    <section class="category-grid" id="s4l-categories"></section>

    <script src="/assets/js/config-global.js"></script>
    <script>
      window.__pageScripts = ['/assets/js/home.js', '/assets/js/vendor-button.js'];
    </script>
  </body>
</html>
