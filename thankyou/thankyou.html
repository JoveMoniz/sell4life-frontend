<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Complete | Sell4Life</title>

    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/thankyou.css?v=20260301" />
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>

  <body class="s4l-loading">
    <div class="thankyou-container">

      <!-- Shown while waiting for order data -->
      <div class="ty-loading" id="ty-loading">
        <div class="ty-spinner"></div>
        <p>Processing your order&hellip;</p>
      </div>

      <!-- Hidden until all data is ready -->
      <div class="thankyou-card" id="thankyou-card">
        <div class="gallery-item">
          <span class="check-inline" aria-hidden="true">✓</span>
          <h1>Thank You for Your Order!</h1>
        </div>

        <p id="payment-status-message"></p>

        <div class="ty-details">
          <strong>Order Number:</strong>
          <span id="order-id">—</span>
        </div>

        <div class="ty-details">
          <strong>Order Date:</strong>
          <span id="order-date">—</span>
        </div>

        <div id="order-items" class="ty-items"></div>

        <div class="ty-summary-row ty-summary-total">
          <span>Total</span>
          <span id="order-total">£0.00</span>
        </div>

        <a href="/" class="ty-btn">Back to Home</a>
      </div>
    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/thankyou.js"></script>
  </body>
</html>
