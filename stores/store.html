<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Store | Sell4Life</title>
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/layout.css?v=20260624" />
    <link rel="stylesheet" href="/assets/css/quick-add.css?v=20260622b" />
    <link rel="stylesheet" href="/assets/css/reviews.css?v=20260622b" />
    <link rel="stylesheet" href="/assets/css/product-card.css?v=20260622b" />
    <style>
      .store-profile-hero {
        background: #0b6b6a;
        padding: 36px 20px 28px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 20px;
      }
      .store-profile-logo {
        width: 72px;
        height: 72px;
        border-radius: 12px;
        background: rgba(255,255,255,0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        flex-shrink: 0;
        overflow: hidden;
      }
      .store-profile-logo img { width: 100%; height: 100%; object-fit: cover; }
      .store-profile-info { flex: 1; min-width: 0; }
      .store-profile-name { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
      .store-profile-slug { font-size: 13px; color: rgba(255,255,255,0.65); margin: 0 0 6px; }
      .store-profile-desc { font-size: 14px; color: rgba(255,255,255,0.8); margin: 0; }
      .store-profile-meta {
        font-size: 12px;
        color: rgba(255,255,255,0.55);
        margin-top: 6px;
        display: flex;
        gap: 14px;
      }

      .store-profile-body {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }
      .store-profile-heading {
        font-size: 17px;
        font-weight: 700;
        color: #111827;
        margin: 0 0 16px;
      }

      .store-products-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
      }
      /* Product card markup/styling is shared with the Shop page â€”
         see product-card.css, quick-add.css, reviews.css */

      .store-empty {
        text-align: center;
        padding: 60px 20px;
        color: #9ca3af;
        font-size: 15px;
      }
      .store-back-link {
        display: inline-block;
        margin-bottom: 20px;
        font-size: 13px;
        color: #0b6b6a;
        text-decoration: none;
      }
      .store-back-link:hover { text-decoration: underline; }

      #store-error {
        text-align: center;
        padding: 80px 20px;
        color: #6b7280;
        font-size: 15px;
      }
    </style>
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>
  <body class="s4l-loading">
    <div id="store-hero" style="display:none">
      <div class="store-profile-hero">
        <div class="store-profile-logo" id="store-logo"></div>
        <div class="store-profile-info">
          <div class="store-profile-name" id="store-name">Loadingâ€¦</div>
          <div class="store-profile-slug" id="store-slug"></div>
          <div class="store-profile-desc" id="store-desc"></div>
          <div class="store-profile-meta">
            <span id="store-product-count"></span>
            <span id="store-joined"></span>
          </div>
        </div>
      </div>
    </div>

    <div id="store-error" style="display:none">Store not found.</div>

    <div class="store-profile-body">
      <a href="/stores/" class="store-back-link">â† Back to all stores</a>
      <div id="store-products-section" style="display:none">
        <div class="store-profile-heading" id="products-heading">Products</div>
        <div class="store-products-grid" id="store-products-grid"></div>
      </div>
    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/shipping-label.js?v=20260622c"></script>
    <script src="/assets/js/product-card.js?v=20260622c"></script>
    <script src="/assets/js/store.js?v=20260622c"></script>
  </body>
</html>
