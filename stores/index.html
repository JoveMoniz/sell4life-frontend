<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stores | Sell4Life</title>
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/layout.css?v=20260532" />
    <style>
      .stores-hero {
        background: #0b6b6a;
        color: #fff;
        padding: 40px 20px 32px;
        text-align: center;
      }
      .stores-hero h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 8px;
      }
      .stores-hero p {
        font-size: 15px;
        color: rgba(255,255,255,0.75);
        margin: 0;
      }

      .stores-body {
        max-width: 1100px;
        margin: 0 auto;
        padding: 28px 20px 60px;
      }

      .stores-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .stores-search {
        flex: 1;
        max-width: 320px;
        padding: 8px 12px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        outline: none;
      }
      .stores-search:focus { border-color: #0b6b6a; }
      .stores-count { font-size: 13px; color: #9ca3af; margin-left: auto; }

      .stores-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 18px;
      }

      .store-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        transition: box-shadow 0.15s;
      }
      .store-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }

      .store-card-avatar {
        height: 90px;
        background: #0b6b6a;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -1px;
      }
      .store-card-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .store-card-body {
        padding: 14px 16px;
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .store-card-name {
        font-size: 16px;
        font-weight: 700;
        color: #111827;
      }
      .store-card-slug {
        font-size: 12px;
        color: #9ca3af;
      }
      .store-card-desc {
        font-size: 13px;
        color: #6b7280;
        margin-top: 4px;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        flex: 1;
      }
      .store-card-meta {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 8px;
      }
      .store-card-btn {
        display: block;
        margin: 12px 16px 14px;
        padding: 8px;
        background: #0b6b6a;
        color: #fff;
        text-align: center;
        border-radius: 7px;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: background 0.15s;
      }
      .store-card-btn:hover { background: #095f5e; }

      .stores-empty {
        text-align: center;
        padding: 60px 20px;
        color: #9ca3af;
        font-size: 15px;
      }
    </style>
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>
  <body class="s4l-loading">
    <div class="stores-hero">
      <h1>Browse Stores</h1>
      <p>Discover independent sellers on Sell4Life</p>
    </div>

    <div class="stores-body">
      <div class="stores-toolbar">
        <input type="text" class="stores-search" id="stores-search" placeholder="Search stores…" />
        <span class="stores-count" id="stores-count"></span>
      </div>
      <div class="stores-grid" id="stores-grid">
        <div class="stores-empty">Loading…</div>
      </div>
    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/layout.js?v=20260603"></script>
    <script src="/assets/js/stores.js?v=20260523a"></script>
  </body>
</html>
