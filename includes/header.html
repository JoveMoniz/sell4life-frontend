<!-- Global Font -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  rel="stylesheet"
  href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
/>

<!-- Favicon -->
<link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />

<!-- Early development notice -->
<div class="site-notice">Sell4Life is in early development. Some features may be unavailable.</div>

<!-- =======================================================
     DESKTOP HEADER
======================================================= -->
<header class="s4l-header-desktop">
  <div class="header-container">
    <div class="desktop-header">
      <!-- Logo -->
      <a href="/" class="header-logo" style="display:inline-flex;align-items:center">
        <svg id="s4l-logo-desktop" xmlns="http://www.w3.org/2000/svg" height="52">
          <text id="s4l-logo-txt-d" y="36"
            font-family="Roboto,Arial,sans-serif"
            font-size="34" font-weight="900" letter-spacing="3">
            <tspan fill="#f18c28">$</tspan><tspan fill="#fff">ell</tspan><tspan fill="#f18c28">4</tspan><tspan fill="#fff">Life</tspan>
          </text>
        </svg>
      </a>

      <!-- Navigation -->
      <nav class="header-nav">
        <a href="/shop/">Buy</a>
        <a href="/sell/">Sell</a>
        <a href="/stores/">Stores</a>
      </nav>

      <!-- Search Bar -->
      <form id="desktop-search-form" class="header-search" role="search">
        <input
          id="desktop-search-input"
          type="text"
          placeholder="Search products..."
          autocomplete="off"
        />
        <button type="submit" aria-label="Search">
          <img src="/assets/images/hero/search.png" alt="Search" width="28" height="28" />
        </button>
        <div class="search-autocomplete desktop-ac"></div>
      </form>

      <!-- Basket + Mini Cart -->

      <div class="header-icons">
        <div class="basket-wrapper">
          <div class="basket-shell" aria-label="Basket">
            <div class="basket-handle"></div>
            <span class="basket-qty hide">0</span>
          </div>

          <div class="mini-cart">
            <ul class="mini-cart-items"></ul>

            <div class="mini-cart-total">
              <span class="mini-cart-total-label">Total:</span>
              <span class="mini-cart-total-value">£0.00</span>
            </div>

            <a href="/cart/cart.html" class="view-cart-btn">View Basket</a>
          </div>
        </div>

        <!-- account -->
        <div class="account-menu">
          <button type="button" id="accountBtnDesktop">Account ▾</button>

          <div class="account-dropdown" id="accountDropdownDesktop">
            <a href="/account/signin.html" class="auth dd-login">Sign in</a>
            <a href="/account/register.html" class="auth dd-register">Register</a>
            <a href="/account/orders.html" class="auth dd-orders">My Orders</a>
            <a href="/account/messages.html" class="auth dd-messages">My Messages <span class="dd-msg-badge"></span></a>
            <a href="/account/settings.html" class="auth dd-settings">Account Settings</a>
            <button type="button" class="dd-logout">Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>

<!-- =======================================================
     MOBILE + TABLET HEADER
======================================================= -->
<header class="s4l-header-mobile">
  <div class="mobile-header-container">
    <div class="mobile-header">
      <!-- ROW 1: Logo + basket + signin -->
      <div class="mobile-top-row">
        <!-- Logo -->
        <a href="/index.html" class="mobile-logo">
          <svg id="s4l-logo-mobile" xmlns="http://www.w3.org/2000/svg" height="42">
            <text id="s4l-logo-txt-m" y="30"
              font-family="Roboto,Arial,sans-serif"
              font-size="28" font-weight="900" letter-spacing="2">
              <tspan fill="#f18c28">$</tspan><tspan fill="#fff">ell</tspan><tspan fill="#f18c28">4</tspan><tspan fill="#fff">Life</tspan>
            </text>
          </svg>
        </a>

        <div class="mobile-right-icons">
          <!-- Basket (NO minicart here) -->
          <div class="basket-wrapper mobile-basket">
            <div class="basket-shell">
              <div class="basket-handle"></div>
              <span class="basket-qty hide">0</span>
            </div>
          </div>

          <!-- Mobile account -->

          <div class="account-menu">
            <button type="button" id="accountBtnMobile">Account ▾</button>

            <div class="account-dropdown" id="accountDropdownMobile">
              <a href="/account/signin.html" class="auth dd-login">Sign in</a>
              <a href="/account/register.html" class="auth dd-register">Register</a>
              <a href="/account/orders.html" class="auth dd-orders">My Orders</a>
              <a href="/account/messages.html" class="auth dd-messages">My Messages <span class="dd-msg-badge"></span></a>
              <a href="/account/settings.html" class="auth dd-settings">Account Settings</a>
              <button type="button" class="dd-logout">Logout</button>
            </div>
          </div>
        </div>
      </div>

      <!-- ROW 2: Search + hamburger (tablet shows nav inline) -->
      <div class="mobile-menu-col">
        <!-- Inline nav — visible on tablet, hidden on portrait phone -->
        <nav class="mobile-nav">
          <a href="/shop/">Buy</a>
          <a href="/sell/">Sell</a>
          <a href="/stores/">Stores</a>
        </nav>

        <!-- Search + hamburger row -->
        <div class="mobile-search-row">
          <form id="mobile-search-form" class="mobile-search" role="search">
            <input
              id="mobile-search-input"
              type="text"
              placeholder="Search products..."
              autocomplete="off"
            />
            <button type="submit" aria-label="Search">
              <img src="/assets/images/hero/search.png" alt="Search" />
            </button>
            <div class="search-autocomplete mobile-ac"></div>
          </form>

          <!-- Hamburger — hidden on tablet, shown on portrait phone -->
          <button
            id="mobile-hamburger"
            class="mobile-hamburger"
            type="button"
            aria-label="Open menu"
            aria-expanded="false"
          >
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>

        <!-- Nav drawer — slides down when hamburger opens it -->
        <div id="mobile-nav-drawer" class="mobile-nav-drawer">
          <a href="/shop/">Buy</a>
          <a href="/sell/">Sell</a>
          <a href="/stores/">Stores</a>
        </div>
      </div>
    </div>
  </div>
</header>
