<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password – Sell4Life</title>
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/auth.css" />
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>
  <body class="s4l-loading">
    <div class="page-auth">
      <a href="/account/signin.html" class="auth-back">← Back to Sign In</a>

      <h2>Set a new password</h2>

      <div class="auth-card" id="resetCard">
        <form id="resetForm">
          <label for="password">New password</label>
          <input
            type="password"
            id="password"
            required
            minlength="8"
            autocomplete="new-password"
            placeholder="At least 8 characters"
          />

          <label for="confirmPassword">Confirm password</label>
          <input
            type="password"
            id="confirmPassword"
            required
            minlength="8"
            autocomplete="new-password"
            placeholder="Repeat your new password"
          />

          <button type="submit">Reset Password</button>
        </form>
        <p id="msg"></p>
      </div>
    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/reset-password.js" defer></script>
  </body>
</html>
