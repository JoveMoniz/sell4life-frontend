  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/vendor.css?v=20260523l" />
    <style>
      .settings-form {
        max-width: 580px;
        margin: 0 auto;
      }
      .settings-section {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 22px 24px;
        margin-bottom: 18px;
      }
      .settings-section-title {
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .04em;
        color: #6b7280;
        margin: 0 0 16px;
        padding-bottom: 10px;
        border-bottom: 1px solid #f3f4f6;
      }
      .settings-field {
        margin-bottom: 16px;
      }
      .settings-field:last-child { margin-bottom: 0; }
      .settings-label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 5px;
      }
      .settings-hint {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 3px;
      }
      .settings-input,
      .settings-textarea,
      .settings-select {
        width: 100%;
        padding: 8px 11px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
        background: #fff;
        color: #111827;
        transition: border-color .15s;
        box-sizing: border-box;
      }
      .settings-input:focus,
      .settings-textarea:focus,
      .settings-select:focus {
        outline: none;
        border-color: #0b6b6a;
        box-shadow: 0 0 0 3px rgba(11,107,106,.1);
      }
      .settings-textarea {
        min-height: 90px;
        resize: vertical;
      }
      .settings-slug-wrap {
        display: flex;
        align-items: center;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        overflow: hidden;
        background: #fff;
      }
      .settings-slug-wrap:focus-within {
        border-color: #0b6b6a;
        box-shadow: 0 0 0 3px rgba(11,107,106,.1);
      }
      .settings-slug-prefix {
        padding: 8px 10px;
        background: #f9fafb;
        border-right: 1px solid #e5e7eb;
        font-size: 13px;
        color: #6b7280;
        white-space: nowrap;
        user-select: none;
      }
      .settings-slug-wrap .settings-input {
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
      .settings-slug-wrap .settings-input:focus {
        box-shadow: none;
      }
      .settings-image-preview {
        margin-top: 6px;
        max-height: 80px;
        max-width: 100%;
        border-radius: 6px;
        border: 1px solid #e5e7eb;
        display: none;
      }
      .settings-type-row {
        display: flex;
        gap: 10px;
      }
      .settings-type-opt {
        flex: 1;
        border: 2px solid #e5e7eb;
        border-radius: 8px;
        padding: 12px 14px;
        cursor: pointer;
        transition: border-color .15s, background .15s;
        user-select: none;
      }
      .settings-type-opt.selected {
        border-color: #0b6b6a;
        background: #f0fdfa;
      }
      .settings-type-opt input { display: none; }
      .settings-type-opt strong { display: block; font-size: 13px; margin-bottom: 2px; }
      .settings-type-opt span { font-size: 11px; color: #6b7280; }

      .settings-save-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 4px;
      }
      .settings-save-btn {
        padding: 9px 22px;
        background: #0b6b6a;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: background .15s;
      }
      .settings-save-btn:hover { background: #085756; }
      .settings-save-btn:disabled { background: #9ca3af; cursor: not-allowed; }
      .settings-msg {
        font-size: 13px;
        display: none;
      }
      .settings-msg.success { color: #15803d; display: inline; }
      .settings-msg.error   { color: #b91c1c; display: inline; }
    </style>
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>
