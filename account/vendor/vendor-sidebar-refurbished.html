<script>
(async function () {
  const tok = localStorage.getItem('s4l_token');
  if (!tok) return;
  try {
    const r = await fetch((window.API_BASE || '') + '/messages/unread-count?view=vendor', {
      headers: { Authorization: 'Bearer ' + tok },
    });
    if (!r.ok) return;
    const { unread } = await r.json();
    const badge = document.getElementById('sidebar-msg-badge');
    if (badge && unread > 0) {
      badge.textContent = unread > 99 ? '99+' : unread;
      badge.className = 'sidebar-msg-badge';
    }
  } catch {}
})();
</script>
