<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Vendor Orders | Sell4Life</title>

    <link rel="stylesheet" href="/assets/css/layout.css" />
    <link rel="stylesheet" href="/assets/css/vendor.css?v=20260622b" />
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>

  <body class="s4l-loading page-orders">
    <div class="vendor-layout">
      <!-- Sidebar injected by layout.js -->
      <div id="vendor-sidebar"></div>

      <main class="vendor-main">
        <div class="vendor-container">

          <div class="orders-sticky-header">
            <a href="/account/vendor/dashboard.html" class="vendor-back-link">
               Back to dashboard
            </a>

            <h1 class="vendor-title">Orders</h1>

            <div class="orders-toolbar">
              <input
                type="text"
                id="vendorOrderSearch"
                class="orders-search-input"
                placeholder="Search by Order ID or email"
                value="S4L-"
              />
              <div class="orders-filter-btns" role="group" aria-label="Order filters">
                <button type="button" class="filter-btn active" data-status="all">All</button>
                <button type="button" class="filter-btn" data-status="active">Active</button>
                <button type="button" class="filter-btn" data-status="issues">Issues</button>
                <button type="button" class="filter-btn" data-status="completed">Completed</button>
              </div>
            </div>
          </div>

          <div id="vendor-orders" class="vendor-orders-list">
            <p class="orders-loading">Loading orders...</p>
          </div>

          <div id="vendor-pagination" class="vendor-pagination"></div>
        </div>
      </main>
    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/vendor-guard.js"></script>
    <script src="/assets/js/layout.js?v=20260627"></script>
    <script src="/assets/js/live-updates.js"></script>
    <script src="/assets/js/vendor-orders.js?v=20260621"></script>
  </body>
</html>
