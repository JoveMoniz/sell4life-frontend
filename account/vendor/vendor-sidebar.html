<script>
(function () {
  const TIER_RANK = { casual: 1, refurbished: 2, professional: 3, enterprise: 4 };
  const TIER_LABELS = { casual: 'Casual', refurbished: 'Refurbished', professional: 'Professional', enterprise: 'Enterprise' };

  function applyTier(type) {
    const rank = TIER_RANK[type] || 1;
    document.querySelectorAll('[data-tier-min]').forEach(el => {
      const required = TIER_RANK[el.dataset.tierMin] || 1;
      el.style.display = rank >= required ? '' : 'none';
    });
    const badge = document.getElementById('sidebar-tier-badge');
    if (badge) {
      badge.textContent = TIER_LABELS[type] || 'Casual';
      badge.dataset.tier = type || 'casual';
    }
  }

  document.addEventListener('vendorLoaded', e => applyTier(e.detail?.type));

  // Fallback: read from localStorage if event already fired
  const cached = localStorage.getItem('s4l_vendorType');
  if (cached) applyTier(cached);
})();
</script>
