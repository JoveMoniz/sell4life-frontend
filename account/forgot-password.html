<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password – Sell4Life</title>
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/auth.css" />
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>
  <body class="s4l-loading">
    <div class="page-auth">
      <a href="/account/signin.html" class="auth-back">← Back to Sign In</a>

      <h2>Reset your password</h2>

      <div class="auth-card">
        <form id="forgotForm">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            required
            autocomplete="email"
            placeholder="you@example.com"
          />
          <button type="submit">Send reset link</button>
        </form>
        <p class="auth-hint">We'll send a link to reset your password.</p>
        <p id="msg"></p>
      </div>
    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/forgot-password.js" defer></script>
  </body>
</html>
