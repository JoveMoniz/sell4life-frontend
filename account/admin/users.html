<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Admin – Users</title>

    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />

    <link rel="stylesheet" href="/assets/css/admin.css" />
    <style>
      #logoutBtn {
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
      }
    </style>
  </head>

  <body class="admin admin-users">
    <!-- STICKY STACK: top bar + search -->
    <div class="admin-sticky">
      <!-- TOP BAR -->
      <div class="admin-top">
        <!-- Logo -->
        <header class="admin-header">
          <a href="/index.html" class="admin-logo">
            <span class="logo-dollar">$</span>
            <span class="logo-text">ell</span>
            <span class="logo-four">4</span>
            <span class="logo-text">Life</span>
          </a>
        </header>

        <!-- Title + Back -->
        <div class="admin-title">
          <a href="/account/admin/index.html" class="admin-back">← back</a>
          <h1>Users</h1>
        </div>

        <!-- Logout -->
        <button id="logoutBtn">Log out</button>
      </div>

      <!-- USER SEARCH -->
      <div class="admin-search-bar">
        <input type="text" id="userSearch" placeholder="Search by email..." autocomplete="off" />
      </div>
    </div>

    <!-- USERS TABLE (WRAPPED – THIS IS THE FIX) -->
    <div class="admin-table-scroll">
      <table class="admin-users-table">
        <thead>
          <tr>
            <th>Email</th>
            <th>Role</th>
            <th>Type</th>
            <th>Status</th>
            <th>Created</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTable">
          <tr>
            <td colspan="6">Loading users...</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div id="pagination"></div>

    <!-- Scripts -->
    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/require-admin.js"></script>
    <script type="module" src="/assets/js/admin-users.js?v=20260521"></script>
    <script type="module" src="/assets/js/admin-logout.js?v=20260211"></script>
  </body>
</html>
