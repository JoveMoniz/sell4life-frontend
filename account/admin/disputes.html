<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Chargebacks | Admin</title>
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/admin.css?v=20260625e" />
    <style>
      #logoutBtn { padding: 5px 10px; font-size: 12px; font-weight: 500; }

      .dp-body { max-width: 900px; margin: 0 auto; padding: 16px 20px 60px; }

      .dp-empty { color: #9ca3af; text-align: center; padding: 60px 20px; font-size: 14px; }

      .dp-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-bottom: 16px;
        overflow: hidden;
      }

      .dp-card-header {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        padding: 14px 16px;
        border-bottom: 1px solid #f3f4f6;
        cursor: pointer;
        user-select: none;
        -webkit-user-select: none;
      }
      .dp-card-header:hover { background: #f9fafb; }

      .dp-order-ref { font-weight: 700; font-size: 14px; color: #111827; }
      .dp-amount { font-size: 14px; font-weight: 700; color: #dc2626; }

      .dp-status {
        font-size: 11px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 10px;
        text-transform: capitalize;
      }
      .dp-status.needs_response { background: #fef3c7; color: #92400e; }
      .dp-status.under_review   { background: #dbeafe; color: #1e40af; }
      .dp-status.won            { background: #dcfce7; color: #166534; }
      .dp-status.lost           { background: #fee2e2; color: #991b1b; }
      .dp-status.charge_refunded,
      .dp-status.warning_closed { background: #f3f4f6; color: #6b7280; }

      .dp-meta { font-size: 11px; color: #9ca3af; }
      .dp-due  { font-size: 11px; color: #d97706; font-weight: 600; }

      .dp-expand { margin-left: auto; font-size: 18px; color: #9ca3af; line-height: 1; }

      .dp-card-body { display: none; padding: 16px; border-top: 1px solid #f3f4f6; }
      .dp-card-body.open { display: block; }

      .dp-field { margin-bottom: 14px; }
      .dp-field label {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: #374151;
        margin-bottom: 4px;
      }
      .dp-field textarea {
        width: 100%;
        min-height: 80px;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        font-family: inherit;
        resize: vertical;
        box-sizing: border-box;
      }
      .dp-field input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        box-sizing: border-box;
      }

      .dp-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 6px; }
      .dp-btn-save {
        padding: 7px 18px;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
      }
      .dp-btn-save:hover { border-color: #0b6b6a; color: #0b6b6a; }
      .dp-btn-submit {
        padding: 7px 18px;
        background: #0b6b6a;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      .dp-btn-submit:hover { background: #095f5e; }
      .dp-btn-submit:disabled,
      .dp-btn-save:disabled { opacity: .5; cursor: not-allowed; }

      .dp-msg { font-size: 12px; }
      .dp-msg.success { color: #166534; }
      .dp-msg.error   { color: #991b1b; }

      .dp-stripe-id { font-size: 10px; color: #d1d5db; font-family: monospace; margin-left: auto; }

      .dp-reason {
        font-size: 12px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 6px;
        padding: 6px 10px;
        margin-bottom: 14px;
        color: #374151;
      }
      .dp-reason strong { display: block; font-size: 11px; color: #9ca3af; margin-bottom: 2px; }
    </style>
  </head>

  <body class="admin">

    <div class="admin-sticky">
      <div class="admin-top">
        <header class="admin-header">
          <a href="/index.html" class="admin-logo">
            <span class="logo-dollar">$</span>
            <span class="logo-text">ell</span>
            <span class="logo-four">4</span>
            <span class="logo-text">Life</span>
          </a>
        </header>
        <div class="admin-title">
          <a href="/account/admin/index.html" class="admin-back">← dashboard</a>
          <h1>Chargebacks</h1>
        </div>
        <button type="button" id="logoutBtn">Log out</button>
      </div>
    </div>

    <div class="dp-body" id="dp-body">
      <div class="dp-empty">Loading…</div>
    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/require-admin.js"></script>
    <script type="module" src="/assets/js/admin-disputes.js?v=20260621"></script>
    <script type="module" src="/assets/js/admin-logout.js?v=20260621"></script>
  </body>
</html>
