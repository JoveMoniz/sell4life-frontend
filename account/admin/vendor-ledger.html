<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Vendor Ledger | Admin</title>
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/admin.css" />
    <style>
      #logoutBtn { padding: 5px 10px; font-size: 12px; font-weight: 500; }

      /* ── Vendor info bar ── */
      .vl-info {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 20px;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        font-size: 13px;
      }
      .vl-info strong { font-size: 15px; }
      .vl-info .vl-email { color: #6b7280; }

      /* ── Period + type filters ── */
      .vl-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 10px 20px 6px;
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
        align-items: center;
      }
      .vl-filter-btn {
        padding: 4px 13px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
        font-size: 12px;
        cursor: pointer;
        transition: background .12s, color .12s, border-color .12s;
      }
      .vl-filter-btn.active,
      .vl-filter-btn:hover {
        background: #0b6b6a;
        color: #fff;
        border-color: #0b6b6a;
      }
      .vl-sep { width: 1px; height: 22px; background: #d1d5db; margin: 0 4px; }

      /* ── Summary cards ── */
      .vl-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
        padding: 16px 20px 8px;
      }
      .vl-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 14px 16px;
        box-shadow: 0 1px 3px rgba(0,0,0,.05);
      }
      .vl-card-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .04em;
        color: #6b7280;
        margin-bottom: 5px;
      }
      .vl-card-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: #111827;
        line-height: 1.1;
      }
      .vl-card-value.positive { color: #15803d; }
      .vl-card-value.negative { color: #b91c1c; }
      .vl-card-value.blue     { color: #1d4ed8; }
      .vl-card-sub { font-size: 11px; color: #9ca3af; margin-top: 3px; }

      /* ── Toolbar ── */
      .vl-toolbar {
        display: flex;
        gap: 8px;
        padding: 6px 20px 8px;
        align-items: center;
      }
      .vl-export-btn {
        padding: 5px 13px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
        font-size: 12px;
        cursor: pointer;
      }
      .vl-export-btn:hover { border-color: #0b6b6a; color: #0b6b6a; }
      .vl-count { font-size: 12px; color: #9ca3af; margin-left: auto; }

      /* ── Transaction table ── */
      .vl-table-wrap {
        overflow-x: auto;
        padding: 0 20px 60px;
      }
      .vl-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12.5px;
        min-width: 760px;
      }
      .vl-table th {
        text-align: left;
        padding: 7px 10px;
        background: #f9fafb;
        border-bottom: 2px solid #e5e7eb;
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        color: #6b7280;
        white-space: nowrap;
      }
      .vl-table td {
        padding: 8px 10px;
        border-bottom: 1px solid #f3f4f6;
        vertical-align: middle;
      }
      .vl-table tr:last-child td { border-bottom: none; }
      .vl-table tr:hover td { background: #fafafa; }
      .vl-num { text-align: right; font-variant-numeric: tabular-nums; }

      /* row type badges */
      .vl-badge {
        display: inline-block;
        padding: 1px 7px;
        border-radius: 10px;
        font-size: 10px;
        font-weight: 700;
        text-transform: capitalize;
      }
      .vl-badge.sale        { background: #dcfce7; color: #166534; }
      .vl-badge.cancelled   { background: #fee2e2; color: #991b1b; }
      .vl-badge.returned    { background: #fef9c3; color: #854d0e; }
      .vl-badge.return_pending { background: #f3f4f6; color: #6b7280; }
      .vl-badge.chargeback  { background: #fce7f3; color: #9d174d; }

      .vl-amount-pos { color: #15803d; font-weight: 600; }
      .vl-amount-neg { color: #b91c1c; font-weight: 600; }
      .vl-amount-pending { color: #9ca3af; font-style: italic; }

      .vl-order-id {
        font-family: monospace;
        font-size: 11px;
        color: #6b7280;
      }
      .vl-buyer { font-size: 11px; color: #9ca3af; }

      .vl-loading { color: #9ca3af; text-align: center; padding: 40px; font-size: 14px; }
      .vl-truncated--hidden { display: none; }
      .vl-truncated {
        background: #fef9c3;
        border: 1px solid #fde68a;
        color: #92400e;
        padding: 8px 16px;
        border-radius: 6px;
        font-size: 12px;
        margin: 0 20px 10px;
      }

      /* ── Body wrapper ── */
      .vl-body {
        max-width: 1100px;
        margin: 0 auto;
      }
    </style>
  </head>

  <body class="admin">

    <!-- TOP BAR -->
    <div class="admin-sticky">
      <div class="admin-top">
        <header class="admin-header">
          <a href="/index.html" class="admin-logo">
            <span class="logo-dollar">$</span>
            <span class="logo-text">ell</span>
            <span class="logo-four">4</span>
            <span class="logo-text">Life</span>
          </a>
        </header>
        <div class="admin-title">
          <a href="/account/admin/vendors.html" class="admin-back" id="back-link">← vendors</a>
          <h1 id="page-title">Vendor Ledger</h1>
        </div>
        <button id="logoutBtn">Log out</button>
      </div>

      <!-- VENDOR INFO + FILTERS -->
      <div id="vl-info-bar" class="vl-info" style="display:none"></div>
      <div class="vl-filters">
        <!-- Period -->
        <button type="button" class="vl-filter-btn active" data-period="all">All Time</button>
        <button type="button" class="vl-filter-btn" data-period="today">Today</button>
        <button type="button" class="vl-filter-btn" data-period="week">This Week</button>
        <button type="button" class="vl-filter-btn" data-period="month">This Month</button>
        <button type="button" class="vl-filter-btn" data-period="quarter">This Quarter</button>
        <button type="button" class="vl-filter-btn" data-period="rolling12">Last 12 Months</button>
        <button type="button" class="vl-filter-btn" data-period="year">Year to Date</button>
        <div class="vl-sep"></div>
        <!-- Type -->
        <button type="button" class="vl-filter-btn active" data-type="all">All</button>
        <button type="button" class="vl-filter-btn" data-type="sales">Sales</button>
        <button type="button" class="vl-filter-btn" data-type="refunds">Refunds</button>
      </div>
    </div>

    <div class="vl-body">

      <!-- SUMMARY CARDS -->
      <div class="vl-cards" id="vl-cards">
        <div class="vl-loading">Loading…</div>
      </div>

      <!-- TOOLBAR -->
      <div class="vl-toolbar">
        <button type="button" class="vl-export-btn" id="vl-export-csv">Export CSV</button>
        <span class="vl-count" id="vl-count"></span>
      </div>

      <!-- TRUNCATION WARNING -->
      <div id="vl-truncated" class="vl-truncated vl-truncated--hidden"></div>

      <!-- TRANSACTION TABLE -->
      <div class="vl-table-wrap">
        <table class="vl-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Order</th>
              <th>Buyer</th>
              <th>Type</th>
              <th>Description</th>
              <th class="vl-num">Amount</th>
              <th class="vl-num">Commission</th>
              <th class="vl-num">Net to Vendor</th>
            </tr>
          </thead>
          <tbody id="vl-table-body">
            <tr><td colspan="8" class="vl-loading">Loading…</td></tr>
          </tbody>
        </table>
      </div>

    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/require-admin.js"></script>
    <script type="module" src="/assets/js/admin-vendor-ledger.js?v=20260603a"></script>
    <script type="module" src="/assets/js/admin-logout.js?v=20260211"></script>
  </body>
</html>
