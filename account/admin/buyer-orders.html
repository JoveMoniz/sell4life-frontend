<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Buyer Orders | Admin</title>
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/admin.css?v=20260625e" />
    <style>
      #logoutBtn { padding: 5px 10px; font-size: 12px; font-weight: 500; }

      /* ── Buyer info bar ── */
      .bo-info {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        padding: 10px 20px;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        font-size: 13px;
      }
      .bo-info strong { font-size: 15px; }

      /* ── Summary cards ── */
      .bo-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px;
        padding: 16px 20px 10px;
      }
      .bo-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 14px 16px;
        box-shadow: 0 1px 3px rgba(0,0,0,.05);
      }
      .bo-card-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .04em;
        color: #6b7280;
        margin-bottom: 5px;
      }
      .bo-card-value {
        font-size: 1.3rem;
        font-weight: 700;
        color: #111827;
        line-height: 1.1;
      }
      .bo-card-value.negative { color: #b91c1c; }
      .bo-card-value.positive { color: #15803d; }
      .bo-card-sub { font-size: 11px; color: #9ca3af; margin-top: 3px; }

      /* ── Toolbar ── */
      .bo-toolbar {
        display: flex;
        gap: 8px;
        padding: 4px 20px 10px;
        align-items: center;
      }
      .bo-count { font-size: 12px; color: #9ca3af; }

      /* ── Orders list ── */
      .bo-list { padding: 0 20px 60px; }

      .bo-order {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        margin-bottom: 12px;
        overflow: hidden;
      }
      .bo-order-header {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        padding: 12px 16px;
        cursor: pointer;
        -webkit-user-select: none;
        user-select: none;
      }
      .bo-order-header:hover { background: #fafafa; }
      .bo-order-id {
        font-family: monospace;
        font-size: 12px;
        color: #6b7280;
        font-weight: 600;
      }
      .bo-order-date { font-size: 12px; color: #9ca3af; }
      .bo-order-total {
        font-weight: 700;
        font-size: 14px;
        margin-left: auto;
      }
      .bo-badge {
        display: inline-block;
        padding: 1px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        text-transform: capitalize;
      }
      .bo-badge.paid              { background:#dcfce7; color:#166534; }
      .bo-badge.refunded          { background:#fee2e2; color:#991b1b; }
      .bo-badge.partially_refunded { background:#fef9c3; color:#854d0e; }
      .bo-badge.pending           { background:#f3f4f6; color:#6b7280; }
      .bo-badge.cancelled         { background:#fee2e2; color:#991b1b; }
      .bo-badge.dispatched        { background:#dbeafe; color:#1e40af; }
      .bo-badge.delivered         { background:#dcfce7; color:#166534; }

      .bo-order-body {
        display: none;
        border-top: 1px solid #f3f4f6;
        padding: 14px 16px;
      }
      .bo-order-body.open { display: block; }

      .bo-items-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12.5px;
        margin-bottom: 10px;
      }
      .bo-items-table th {
        text-align: left;
        padding: 5px 8px;
        background: #f9fafb;
        font-size: 10.5px;
        font-weight: 700;
        text-transform: uppercase;
        color: #6b7280;
        border-bottom: 1px solid #e5e7eb;
      }
      .bo-items-table td {
        padding: 7px 8px;
        border-bottom: 1px solid #f3f4f6;
        vertical-align: middle;
      }
      .bo-items-table tr:last-child td { border-bottom: none; }
      .bo-num { text-align: right; }

      .bo-addr {
        font-size: 12px;
        color: #6b7280;
        line-height: 1.6;
      }
      .bo-refund-tag {
        font-size: 10px;
        background: #fee2e2;
        color: #991b1b;
        padding: 1px 5px;
        border-radius: 8px;
        margin-left: 4px;
      }

      .bo-loading { color: #9ca3af; text-align: center; padding: 40px; font-size: 14px; }
      .bo-body { max-width: 900px; margin: 0 auto; }

      .bo-pagination {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 20px 50px;
      }
      .bo-pg-btn {
        padding: 5px 14px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
        font-size: 13px;
        cursor: pointer;
      }
      .bo-pg-btn:disabled { opacity: .4; cursor: not-allowed; }
      .bo-pg-btn:not(:disabled):hover { border-color: #0b6b6a; color: #0b6b6a; }
      .bo-pg-info { font-size: 13px; color: #6b7280; }
    </style>
  </head>

  <body class="admin">

    <!-- TOP BAR -->
    <div class="admin-sticky">
      <div class="admin-top">
        <header class="admin-header">
          <a href="/index.html" class="admin-logo">
            <span class="logo-dollar">$</span>
            <span class="logo-text">ell</span>
            <span class="logo-four">4</span>
            <span class="logo-text">Life</span>
          </a>
        </header>
        <div class="admin-title">
          <a href="/account/admin/users.html" class="admin-back">← users</a>
          <h1 id="page-title">Buyer Orders</h1>
        </div>
        <button type="button" id="logoutBtn">Log out</button>
      </div>
      <div id="bo-info-bar" class="bo-info" style="display:none"></div>
    </div>

    <div class="bo-body">

      <!-- SUMMARY CARDS -->
      <div class="bo-cards" id="bo-cards">
        <div class="bo-loading">Loading…</div>
      </div>

      <!-- TOOLBAR -->
      <div class="bo-toolbar">
        <span class="bo-count" id="bo-count"></span>
      </div>

      <!-- ORDERS -->
      <div class="bo-list" id="bo-list">
        <div class="bo-loading">Loading…</div>
      </div>

      <!-- PAGINATION -->
      <div id="bo-pagination" class="bo-pagination"></div>

    </div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/require-admin.js"></script>
    <script type="module" src="/assets/js/admin-buyer-orders.js?v=20260621"></script>
    <script type="module" src="/assets/js/admin-logout.js?v=20260621"></script>
  </body>
</html>
