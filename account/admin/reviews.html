<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Reviews Management | Admin</title>
    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/admin.css" />
    <link rel="stylesheet" href="/assets/css/reviews.css" />
    <style>
      #logoutBtn { padding: 5px 10px; font-size: 12px; font-weight: 500; }
      .arv-body { max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }
      .arv-body { margin-top: 20px; }
      .arv-toast { position: fixed; bottom: 24px; right: 24px; background: #0b6b6a; color: #fff;
        padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600;
        opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 9999; }
      .arv-toast.show { opacity: 1; }
    </style>
  </head>
  <body class="admin">

    <!-- TOP BAR (matches fees.html / other admin pages) -->
    <div class="admin-sticky">
      <div class="admin-top">
        <header class="admin-header">
          <a href="/index.html" class="admin-logo">
            <span class="logo-dollar">$</span>
            <span class="logo-text">ell</span>
            <span class="logo-four">4</span>
            <span class="logo-text">Life</span>
          </a>
        </header>
        <div class="admin-title">
          <a href="/account/admin/index.html" class="admin-back">← dashboard</a>
          <h1>Reviews &amp; Ratings</h1>
        </div>
        <button type="button" id="logoutBtn">Log out</button>
      </div>
    </div>

    <div class="arv-body">


      <!-- Settings card -->
      <div class="arv-toggle-row">
        <span class="arv-toggle-label">Reviews &amp; Ratings</span>
        <label class="arv-switch">
          <input type="checkbox" id="arv-enabled-toggle" />
          <span class="arv-slider"></span>
        </label>
        <span class="arv-status-text" id="arv-status-text">Off</span>

        <div class="arv-min-row">
          <label for="arv-min-input">Show stars publicly after</label>
          <input type="number" id="arv-min-input" min="1" max="100" value="3" />
          <span>reviews</span>
          <button class="arv-save-btn" id="arv-save-btn">Save</button>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="arv-filter-bar">
        <button class="arv-filter-btn active" data-status="">All</button>
        <button class="arv-filter-btn" data-status="approved">Approved</button>
        <button class="arv-filter-btn" data-status="rejected">Rejected</button>
        <button class="arv-filter-btn" data-status="pending">Pending</button>
      </div>

      <!-- Reviews list -->
      <div class="arv-list" id="arv-list">
        <p style="color:#9ca3af;font-size:14px;text-align:center;padding:24px 0">Loading…</p>
      </div>

      <div id="arv-pagination" style="margin-top:16px;display:flex;gap:8px;justify-content:center"></div>
    </div>

    <div class="arv-toast" id="arv-toast"></div>

    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/require-admin.js"></script>
    <script src="/assets/js/reviews.js"></script>
    <script type="module" src="/assets/js/admin-reviews.js"></script>
    <script type="module" src="/assets/js/admin-logout.js?v=20260211"></script>
  </body>
</html>
