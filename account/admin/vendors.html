<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>Admin – Vendors</title>

    <link rel="stylesheet" href="/assets/css/admin.css?v=20260602a" />
    <style>#logoutBtn { padding: 5px 10px; font-size: 12px; font-weight: 500; }</style>
  </head>

  <body class="admin admin-vendors">
    <!-- STICKY STACK: top bar + search/filters -->
    <div class="admin-sticky">
      <!-- TOP BAR -->
      <div class="admin-top">
        <!-- Logo -->
        <header class="admin-header">
          <a href="/index.html" class="admin-logo">
            <span class="logo-dollar">$</span>
            <span class="logo-text">ell</span>
            <span class="logo-four">4</span>
            <span class="logo-text">Life</span>
          </a>
        </header>

        <!-- Title -->
        <div class="admin-title">
          <a href="/account/admin/index.html" class="admin-back">← back</a>
          <h1>Vendors</h1>
        </div>

        <!-- Logout -->
        <button id="logoutBtn">Log out</button>
      </div>

      <!-- SEARCH + FILTER BAR -->
      <div class="admin-filters">
        <input
          type="text"
          id="vendorSearch"
          placeholder="Search vendor name or email"
          autocomplete="off"
        />

        <div class="filter-tabs">
          <button class="filter-btn active" data-status="all">All</button>
          <button class="filter-btn" data-status="pending">Pending</button>
          <button class="filter-btn" data-status="approved">Approved</button>
          <button class="filter-btn" data-status="suspended">Suspended</button>
        </div>
      </div>
    </div>

    <!-- NOTIFICATION BUTTONS -->
    <div class="admin-notif-bar">
      <button type="button" id="payout-panel-toggle" class="admin-notif-btn">
        Payout Requests
        <span id="payout-badge" class="admin-payout-badge">0</span>
      </button>
      <button type="button" id="upgrade-panel-toggle" class="admin-notif-btn">
        Tier Upgrades
        <span id="upgrade-badge" class="admin-payout-badge">0</span>
      </button>
    </div>

    <!-- PAYOUT DROPDOWN -->
    <div id="payout-panel-body" class="admin-notif-panel">
      <table class="admin-payout-table">
        <thead>
          <tr>
            <th>Vendor</th>
            <th>Amount</th>
            <th>Requested</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="payout-requests-body">
          <tr><td colspan="4" class="admin-payout-empty">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- UPGRADE DROPDOWN -->
    <div id="upgrade-panel-body" class="admin-notif-panel">
      <table class="admin-payout-table">
        <thead>
          <tr>
            <th>Vendor</th>
            <th>Current Tier</th>
            <th>Requested</th>
            <th>Message</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="upgrade-requests-body">
          <tr><td colspan="5" class="admin-payout-empty">No pending requests</td></tr>
        </tbody>
      </table>
    </div>

    <!-- TOOLBAR -->
    <div class="admin-toolbar">
      <button type="button" id="vendors-export-csv" class="admin-toolbar-btn">Export CSV</button>
    </div>

    <!-- VENDOR TABLE -->
    <div class="admin-table-scroll">
      <table class="admin-vendors-table">
        <thead>
          <tr>
            <th>Vendor</th>
            <th>Email</th>
            <th>Status</th>
            <th>Orders</th>
            <th>Gross Revenue</th>
            <th>Refunds</th>
            <th>Commission</th>
            <th>Net to Vendor</th>
            <th>Created</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody id="vendorsTable">
          <tr>
            <td colspan="10">Loading vendors...</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- PAGINATION -->
    <div id="pagination"></div>

    <!-- Scripts -->
    <script src="/assets/js/config-global.js"></script>
    <script src="/assets/js/require-admin.js"></script>
    <script type="module" src="/assets/js/admin-vendors.js?v=20260611"></script>
    <script type="module" src="/assets/js/admin-logout.js?v=20260211"></script>
  </body>
</html>
