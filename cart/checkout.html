<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout | Sell4Life</title>

    <link rel="icon" type="image/png" href="/assets/images/hero/favicon.png" />
    <link rel="stylesheet" href="/assets/css/layout.css?v=20260532" />
    <link rel="stylesheet" href="/assets/css/checkout.css?v=20260531" />

    <!-- 🔐 Stripe -->
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="/assets/css/quick-add.css" />
    <style id="s4l-fouc">html{visibility:hidden}</style>
  </head>

  <body class="s4l-loading">
    <div class="desktop-header-wrapper"></div>

    <div class="mobile-header-wrapper">
      <div id="header-mobile"></div>
    </div>

    <div class="checkout-container">
      <h1>Checkout</h1>

      <div class="checkout-grid">
        <!-- LEFT SIDE -->
        <div class="checkout-left">
          <!-- Contact -->
          <div class="checkout-section">
            <h2>Contact Information</h2>
            <label>Email</label>
            <input type="email" id="checkout-email" placeholder="your@email.com" />
          </div>

          <!-- Shipping -->
          <div class="checkout-section">
            <h2>Shipping Address</h2>

            <label>Full Name</label>
            <input type="text" id="checkout-name" placeholder="John Doe" />

            <label>Address</label>
            <input type="text" id="checkout-address" placeholder="123 Main Street" />

            <label>City</label>
            <input type="text" id="checkout-city" />

            <label>Postcode</label>
            <input type="text" id="checkout-postcode" />

            <label>Country</label>
            <input type="text" id="checkout-country" value="United Kingdom" />
          </div>

          <!-- Payment -->
          <div class="checkout-section">
            <h2>Payment</h2>

            <!-- Stripe mounts securely here -->
            <div id="payment-element"></div>

            <div id="payment-message" class="hidden"></div>
          </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="checkout-right">
          <div class="checkout-summary">
            <h2>Your Order</h2>

            <div id="checkout-items"></div>

            <div class="checkout-totals">
              <div>
                <span>Subtotal</span>
                <span id="checkout-subtotal">£0.00</span>
              </div>
              <div>
                <span>Shipping</span>
                <span id="checkout-shipping">£0.00</span>
              </div>
              <div class="total-line">
                <span>Total</span>
                <span id="checkout-total">£0.00</span>
              </div>
            </div>

            <button id="place-order-btn" class="checkout-btn">Pay Now</button>
          </div>

          <div class="checkout-exit">
            <a href="/cart/cart.html" class="btn-back">← Back to Basket</a>
            <a href="/shop/index.html" class="btn-shop">Continue Shopping →</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Global config -->
    <script src="/assets/js/config-global.js"></script>

    <!-- Layout -->
    <script src="/assets/js/layout.js?v=20260603"></script>

    <!-- Checkout logic -->
    <script>
      window.__pageScripts = ['/assets/js/checkout.js?v=20260301'];
    </script>

    <!-- Prevent back navigation after completed checkout -->
    <script>
      (function () {
        window.addEventListener('pageshow', function (event) {
          const completed = localStorage.getItem('checkout_completed') === 'true';
          const cart = JSON.parse(localStorage.getItem('cart') || '[]');

          if (completed && cart.length === 0) {
            window.location.replace('/index.html');
          }
        });
      })();
    </script>
  </body>
</html>
